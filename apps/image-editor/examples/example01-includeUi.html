<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>TUI Image Editor — 包含序号标注、箭头画笔、中文语言</title>
    <link
      type="text/css"
      href="https://uicdn.toast.com/tui-color-picker/v2.2.6/tui-color-picker.css"
      rel="stylesheet"
    />
    <link type="text/css" href="../dist/tui-image-editor.css" rel="stylesheet" />
    <style>
      @import url(http://fonts.googleapis.com/css?family=Noto+Sans);
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="tui-image-editor-container"></div>
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.4.0/fabric.js"
    ></script>
    <script
      type="text/javascript"
      src="https://uicdn.toast.com/tui.code-snippet/v1.5.0/tui-code-snippet.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://uicdn.toast.com/tui-color-picker/v2.2.6/tui-color-picker.js"
    ></script>
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.3/FileSaver.min.js"
    ></script>
    <script type="text/javascript" src="../dist/tui-image-editor.js"></script>
    <script type="text/javascript" src="js/theme/white-theme.js"></script>
    <script type="text/javascript" src="js/theme/black-theme.js"></script>
    <script>
      // 中文语言包（从 zh_CN.js 移植的内联版本，供示例直接使用）
      var zhCN = {
        Crop: '裁剪', Draw: '画笔', Shape: '形状', Icon: '图标',
        Text: '文字', Mask: '蒙版', Filter: '滤镜', Annotation: '序号标注',
        Resize: '调整尺寸', Flip: '翻转', Rotate: '旋转', Zoom: '缩放',
        Apply: '应用', Cancel: '取消', Delete: '删除', DeleteAll: '全部删除',
        Reset: '重置', Undo: '撤销', Redo: '重做', Load: '加载',
        Download: '下载', History: '历史记录',
        Custom: '自定义', Square: '正方形', Free: '自由',
        'Lock Aspect Ratio': '锁定比例',
        'Flip X': '水平翻转', 'Flip Y': '垂直翻转',
        Straight: '直线', Color: '颜色', Range: '粗细',
        Rectangle: '矩形', Circle: '圆形', Triangle: '三角形',
        Fill: '填充', Stroke: '描边',
        'Arrow-1': '箭头1', 'Arrow-2': '箭头2', 'Arrow-3': '箭头3',
        'Star-1': '星形1', 'Star-2': '星形2', Polygon: '多边形',
        Location: '定位', Heart: '心形', Bubble: '气泡',
        'Custom icon': '自定义图标',
        Bold: '加粗', Italic: '斜体', Underline: '下划线',
        Left: '居左', Center: '居中', Right: '居右', 'Text size': '字体大小',
        'Load Mask Image': '加载蒙版图片',
        Grayscale: '灰度', Invert: '反色', Sepia: '深褐色', Blur: '模糊',
        Sharpen: '锐化', Emboss: '浮雕', 'Remove White': '去除白色',
        Distance: '边距', Brightness: '亮度', Noise: '噪点',
        Pixelate: '像素化', 'Color Filter': '颜色过滤', Threshold: '阈值',
        Tint: '色调', Multiply: '正片叠底', Blend: '混合',
        'Zoom In': '放大', 'Zoom Out': '缩小', ZoomIn: '放大', ZoomOut: '缩小', Hand: '拖动',
        Width: '宽', Height: '高',
        // 序号标注子菜单
        'Text Color': '文字色', 'Background Color': '背景色',
        TextColor: '文字色', BgColor: '背景色',
        NextStep: '下次序号', ResetStep: '重置为 1', 'Custom Color': '自定义颜色',
        // 画笔箭头
        NoArrow: '无箭头', SingleArrow: '单箭头', DoubleArrow: '双箭头',
      };

      // 图片编辑器实例
      var imageEditor = new tui.ImageEditor('#tui-image-editor-container', {
        includeUI: {
          loadImage: {
            path: 'img/sampleImage2.png',
            name: 'SampleImage',
          },
          theme: blackTheme, // 或 whiteTheme
          locale: zhCN,      // 中文语言包
          // 完整菜单：包含所有功能
          menu: [
            'resize',
            'crop',
            'flip',
            'rotate',
            'draw',
            'shape',
            'icon',
            'text',
            'mask',
            'filter',
            'annotation'
          ],
          initMenu: 'draw',
          menuBarPosition: 'bottom',
        },
        cssMaxWidth: 700,
        cssMaxHeight: 500,
        usageStatistics: false,
      });
      window.onresize = function () {
        imageEditor.ui.resizeEditor();
      };
    </script>
  </body>
</html>
